services:
  autotube:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autotube-factory
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env.local
    environment:
      - DATABASE_URL=file:/app/data/dev.db
      - NEXT_PUBLIC_APP_URL=http://localhost:3001
      # Local services — reachable via host.docker.internal when running on host
      # Or via service name when running in Docker (see optional services below)
      - COMFYUI_URL=http://host.docker.internal:8188
      - OLLAMA_URL=http://host.docker.internal:11434
      # TTS servers — uses host.docker.internal by default
      # Set to http://kokoro:8880 if using the kokoro service below
      - KOKORO_URL=http://host.docker.internal:8880
      - ALLTALK_URL=http://host.docker.internal:7851
      - FISH_SPEECH_URL=http://host.docker.internal:8080
    volumes:
      # Persist SQLite database across restarts
      - autotube-db:/app/data
      # Persist generated files (images, thumbnails, subtitles, audio)
      - autotube-generated:/app/public/generated
    # Allow container to reach host services (ComfyUI, Ollama, LM Studio, AllTalk, Fish)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/models/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Optional: Kokoro TTS (best free quality) ────────────────────────────────
  # Start with: docker compose --profile tts up -d
  # Or always on: change "tts" profile to remove it and just keep the service
  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:v0.2.2
    container_name: kokoro-tts
    profiles: ["tts"]
    restart: unless-stopped
    ports:
      - "8880:8880"

  # ── Optional: Ollama in Docker (local LLM) ────────────────────────────────────
  # Only use this if Ollama is NOT already running on your host machine.
  # If Ollama is already running on the host (port 11434), skip this profile —
  # AutoTube and Open WebUI will reach it via host.docker.internal:11434 automatically.
  #
  # Start: docker compose --profile llm up -d
  # Pull Hermes 3: docker exec ollama ollama pull hermes3:8b
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    profiles: ["llm"]
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama

  # ── Optional: Open WebUI — browser UI for Ollama ─────────────────────────────
  # Access at: http://localhost:3002
  # Start with: docker compose --profile webui up -d
  #
  # Works with Ollama running EITHER:
  #   - On your host machine (already running) ← most common case
  #   - In Docker via --profile llm
  #
  # Gives a full ChatGPT-like interface to run Hermes 3, Llama, Mistral locally.
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    profiles: ["webui"]
    restart: unless-stopped
    ports:
      - "3002:8080"
    environment:
      # Points to host Ollama (or Docker Ollama — both exposed on host:11434)
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - WEBUI_AUTH=false           # set to true to require login
      - WEBUI_NAME=AutoTube Local AI
    volumes:
      - open-webui-data:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  autotube-db:
  autotube-generated:
  ollama-models:
  open-webui-data:
