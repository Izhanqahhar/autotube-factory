services:
  autotube:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autotube-factory
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env.local
    environment:
      - DATABASE_URL=file:/app/data/dev.db
      - NEXT_PUBLIC_APP_URL=http://localhost:3001
      # Local services — reachable via host.docker.internal when running on host
      # Or via service name when running in Docker (see optional services below)
      - COMFYUI_URL=http://host.docker.internal:8188
      - OLLAMA_URL=http://host.docker.internal:11434
      # TTS servers — uses host.docker.internal by default
      # Set to http://kokoro:8880 if using the kokoro service below
      - KOKORO_URL=http://host.docker.internal:8880
      - ALLTALK_URL=http://host.docker.internal:7851
      - FISH_SPEECH_URL=http://host.docker.internal:8080
    volumes:
      # Persist SQLite database across restarts
      - autotube-db:/app/data
      # Persist generated files (images, thumbnails, subtitles, audio)
      - autotube-generated:/app/public/generated
    # Allow container to reach host services (ComfyUI, Ollama, LM Studio, AllTalk, Fish)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/models/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Optional: Kokoro TTS (best free quality) ────────────────────────────────
  # Start with: docker compose --profile tts up -d
  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:v0.2.2
    container_name: kokoro-tts
    profiles: ["tts"]
    restart: unless-stopped
    ports:
      - "8880:8880"

  # ── Optional: Ollama in Docker (local LLM) ──────────────────────────────────
  # Use ONLY if Ollama is NOT already running on your host machine.
  # If host Ollama is running (port 11434), AutoTube reaches it automatically.
  #
  # Start:          docker compose --profile llm up -d
  # Auto-pull on start via ollama-init service below.
  # With Open WebUI: docker compose --profile llm --profile webui up -d
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    profiles: ["llm"]
    restart: unless-stopped
    # No host port binding — avoids conflict when host Ollama is running.
    # Accessible within Docker network as ollama:11434
    expose:
      - "11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Ollama init — auto-pulls Hermes 3 8B when Docker Ollama starts ──────────
  # Runs once, exits after pull. Models stored in ollama-models volume.
  # To pull more models: docker exec ollama ollama pull hermes3:70b
  ollama-init:
    image: curlimages/curl:latest
    container_name: ollama-init
    profiles: ["llm"]
    restart: "no"
    entrypoint: >
      sh -c "
        echo 'Waiting for Ollama to be ready...';
        until curl -sf http://ollama:11434/api/tags > /dev/null; do sleep 2; done;
        echo 'Pulling hermes3:8b (best for AutoTube scripts)...';
        curl -sf -X POST http://ollama:11434/api/pull -d '{\"name\":\"hermes3:8b\"}' | cat;
        echo 'Pulling hermes3:3b (fast/small)...';
        curl -sf -X POST http://ollama:11434/api/pull -d '{\"name\":\"hermes3:3b\"}' | cat;
        echo 'Done! Hermes 3 ready.';
      "
    depends_on:
      ollama:
        condition: service_healthy

  # ── Open WebUI — ChatGPT-like browser UI for Ollama / Hermes ────────────────
  # Access at: http://localhost:3002
  #
  # Scenario A (host Ollama already running):
  #   docker compose --profile webui up -d
  # Scenario B (Docker Ollama, no host Ollama):
  #   docker compose --profile llm --profile webui up -d
  #
  # Hermes 3 8B is pre-set as the default model.
  # AutoTube generated files (images, audio, etc.) are visible in Open WebUI
  # under /workspace — you can reference them in chat.
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    profiles: ["webui"]
    restart: unless-stopped
    ports:
      - "3002:8080"
    environment:
      # Try Docker Ollama first, fall back to host Ollama — both scenarios work
      - OLLAMA_BASE_URLS=http://ollama:11434;http://host.docker.internal:11434
      - WEBUI_AUTH=false
      - WEBUI_NAME=AutoTube Local AI
      # Pre-select Hermes 3 8B as the default chat model
      - DEFAULT_MODELS=hermes3:8b
      # System prompt context for AutoTube workflow
      - DEFAULT_SYSTEM_PROMPT=You are an expert YouTube content creator and scriptwriter. You help with writing scripts, voiceover copy, video ideas, SEO titles, descriptions, and content strategy. Be concise, engaging, and optimised for YouTube audiences.
      # RAG / document workspace — share AutoTube generated files
      - DOCS_DIR=/workspace/generated
      - UPLOAD_DIR=/workspace/uploads
    volumes:
      - open-webui-data:/app/backend/data
      # Share AutoTube generated files so you can reference them in Open WebUI chat
      - autotube-generated:/workspace/generated:ro
      # Dedicated upload dir for Open WebUI documents
      - open-webui-uploads:/workspace/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  autotube-db:
  autotube-generated:
  ollama-models:
  open-webui-data:
  open-webui-uploads:
