services:
  autotube:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autotube-factory
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env.local
    environment:
      - DATABASE_URL=file:/app/data/dev.db
      - NEXT_PUBLIC_APP_URL=http://localhost:3001
      # ComfyUI running on host machine — reachable via host.docker.internal
      - COMFYUI_URL=http://host.docker.internal:8188
    volumes:
      # Persist SQLite database across restarts
      - autotube-db:/app/data
      # Persist generated files (images, thumbnails, subtitles, audio)
      - autotube-generated:/app/public/generated
    # Allow container to reach host services (ComfyUI, Ollama, LM Studio)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/models/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  autotube-db:
  autotube-generated:
